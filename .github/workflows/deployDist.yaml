name: Deploy Dist
on: [push, workflow_dispatch]
# on:
#    - push
#    - workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: install node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: print node version
        run: node -v
      - name: install dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Ged Code
        uses: actions/checkout@v6
      - name: install node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: insall dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Deploy
        run: echo "Deploy successful"
