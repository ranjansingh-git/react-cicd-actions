name: Deploy Dist
on: [push,workflow_dispatch]
# on: 
#    - push
#    - workflow_dispatch
jobs: 
    test: 
        runs-on: ubuntu-latest
        steps:
            - name: Get Code 
              uses: actions/checkout@v6
            - name: install node 
              uses: actions/setup-node@v6
              with: 
                  node-version: 20
            - name: print node version
              run: node -v 
            - name: install dependencies 
              run: npm ci
            - name: Run Tests
              run: npm run test
