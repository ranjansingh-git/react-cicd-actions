name: Deploy Dist
# on: [push, workflow_dispatch]
# on:
#    - push
#    - workflow_dispatch
on:
  push:
    branches:
      - main
      - feature/**
    paths-ignore:
      - ".github/workflows/*"
      - README.md
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: install node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{runner.os}}-node-${{hashFiles('**/package-lock.json')}}
      - name: print node version
        run: node -v
      - name: install dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
  build: 
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Ged Code
        uses: actions/checkout@v6
      - name: install node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{runner.os}}-node-${{hashFiles('**/package-lock.json')}}
      - name: insall dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
            name: dist-files
            path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Upload dist artifact
        uses: actions/download-artifact@v8
        with:
            name: dist-files
            path: dist
      - name: Deploy
        run: echo "Deploy successful"
